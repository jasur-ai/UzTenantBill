<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ro'yxatdan o'tish — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-wrapper { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f172a 0%,#1e2937 100%); padding:20px; }
    .auth-card { background:white; border-radius:20px; box-shadow:0 25px 50px -12px rgb(15 23 42 / 0.25); width:100%; max-width:460px; overflow:hidden; }
    .auth-header { padding:26px 32px 16px; background:#f8fafc; }
    .form-group { margin-bottom:16px; }
    .premium-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      font-size: 15px;
      outline: none;
    }
    .premium-input:focus { border-color:#0ea5e9; box-shadow:0 0 0 3px rgba(14,165,233,0.1); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
          <span id="logo-container"></span>
          <span style="font-size:22px; font-weight:700; letter-spacing:-0.5px;">UzTenantBill</span>
        </div>
        <div style="font-size:14.5px; color:#64748b;">Ro'yxatdan o'ting — 30 kun bepul</div>
      </div>

      <div style="padding:26px 32px 30px;">
        <form id="register-form">
          <div class="form-group">
            <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">To'liq ism</label>
            <input type="text" id="fullName" class="premium-input" required placeholder="Alisher Karimov" value="Alisher Karimov">
          </div>

          <div class="form-group">
            <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">Kompaniya / Bino nomi</label>
            <input type="text" id="company" class="premium-input" required placeholder="Sergeli Business Hub" value="Sergeli Business Hub">
          </div>

          <div class="row">
            <div class="form-group">
              <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">Email</label>
              <input type="email" id="email" class="premium-input" required placeholder="siz@kompaniya.uz" value="manager@demo.uz">
            </div>
            <div class="form-group">
              <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">Telefon</label>
              <input type="tel" id="phone" class="premium-input" required value="+998901234567">
            </div>
          </div>

          <div class="form-group">
            <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">Parol</label>
            <div style="position:relative;">
              <input type="password" id="password" class="premium-input" required minlength="6" placeholder="Kamida 6 ta belgi" oninput="checkPasswordStrength()">
              <span onclick="togglePasswordVisibility('password','reg-eye')" id="reg-eye" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:17px; opacity:0.6;">👁️</span>
            </div>
            <div id="password-strength" style="margin-top:6px; height:4px; background:#e2e8f0; border-radius:999px; overflow:hidden; display:none;">
              <div id="strength-bar" style="height:4px; width:0%; transition:width .3s; background:#ef4444;"></div>
            </div>
            <small id="strength-text" style="font-size:11px; color:#64748b; display:none; margin-top:3px;"></small>
          </div>

          <div class="form-group">
            <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">Parolni tasdiqlang</label>
            <input type="password" id="confirmPassword" class="premium-input" required minlength="6" placeholder="Parolni qayta kiriting">
          </div>

          <div class="form-group">
            <label style="display:block; font-size:13px; font-weight:600; margin-bottom:5px;">Rol</label>
            <select id="role" class="premium-input" style="height:42px;">
              <option value="admin">Administrator</option>
              <option value="accountant">Buxgalter / Accountant</option>
              <option value="tenant">Ijarachi</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; padding:13px; margin-top:10px; font-size:15px; font-weight:700;">
            Ro'yxatdan o'tish
          </button>
        </form>

        <div style="margin-top:20px; text-align:center; font-size:13.5px;">
          Allaqachon hisobingiz bormi? <a href="login.html" style="color:#0ea5e9; font-weight:600;">Kirish</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Robust modal container -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">UzTenantBill <span onclick="this.closest('.modal').classList.remove('active')" style="cursor:pointer;font-size:26px;line-height:1;">×</span></div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logo.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        alert("Parollar mos kelmadi!");
        return;
      }

      const userData = {
        fullName: document.getElementById('fullName').value,
        company: document.getElementById('company').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: password,
        role: document.getElementById('role').value
      };

      const result = window.UzAuth.registerUser(userData);
      if (result.success) {
        window.UzAuth.setCurrentUser(result.user);
        alert("Ro'yxatdan o'tish muvaffaqiyatli! Dashboardga o'tilmoqda...");
        window.location.href = 'dashboard.html';
      } else {
        alert(result.error);
      }
    });

    function togglePasswordVisibility(inputId, eyeId) {
      const input = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      if (!input) return;
      if (input.type === 'password') {
        input.type = 'text';
        eye.textContent = '🙈';
      } else {
        input.type = 'password';
        eye.textContent = '👁️';
      }
    }

    window.checkPasswordStrength = function() {
      const input = document.getElementById('password');
      const container = document.getElementById('password-strength');
      const bar = document.getElementById('strength-bar');
      const text = document.getElementById('strength-text');
      if (!input || !container || !bar || !text) return;

      const val = input.value;
      let score = 0;
      let label = '';
      let color = '#ef4444';

      if (val.length >= 6) score += 1;
      if (val.length >= 8) score += 1;
      if (/[A-Z]/.test(val)) score += 1;
      if (/[0-9]/.test(val)) score += 1;
      if (/[^A-Za-z0-9]/.test(val)) score += 1;

      container.style.display = 'block';
      text.style.display = 'block';

      if (score <= 1) { label = 'Zaif'; color = '#ef4444'; bar.style.width = '25%'; }
      else if (score === 2) { label = "O'rtacha"; color = '#f59e0b'; bar.style.width = '50%'; }
      else if (score === 3) { label = 'Yaxshi'; color = '#10b981'; bar.style.width = '75%'; }
      else { label = 'Kuchli'; color = '#10b981'; bar.style.width = '100%'; }

      bar.style.background = color;
      text.style.color = color;
      text.textContent = label;
    };

    // Logo
    setTimeout(() => {
      const logoContainer = document.getElementById('logo-container');
      if (logoContainer && window.UzLogo) {
        logoContainer.innerHTML = window.UzLogo.getLogoSVG(28);
      }
    }, 60);
  </script>
</body>
</html>
