<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ro'yxatdan o'tish — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-wrapper { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f172a 0%,#1e2937 100%); padding:20px; }
    .auth-card { background:white; border-radius:20px; box-shadow:0 25px 50px -12px rgb(15 23 42 / 0.25); width:100%; max-width:460px; overflow:hidden; }
    .auth-header { padding:28px 32px 18px; background:#f8fafc; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
          <div style="width:34px;height:34px;background:linear-gradient(135deg,#0ea5e9,#0284c8);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;">U</div>
          <span style="font-size:22px;font-weight:700;letter-spacing:-0.5px">UzTenantBill</span>
        </div>
        <div style="font-size:15px;color:#64748b">Ro'yxatdan o'ting</div>
      </div>

      <div style="padding:28px 32px 32px">
        <form id="register-form">
          <div class="form-group">
            <label>To'liq ism</label>
            <input type="text" id="fullName" required placeholder="Alisher Karimov" value="Alisher Karimov">
          </div>

          <div class="form-group">
            <label>Kompaniya / Bino nomi</label>
            <input type="text" id="company" required placeholder="Sergeli Business Hub" value="Sergeli Business Hub">
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" required placeholder="siz@kompaniya.uz" value="manager@demo.uz">
            </div>
            <div class="form-group">
              <label>Telefon</label>
              <input type="tel" id="phone" required value="+998901234567">
            </div>
          </div>

          <div class="form-group">
            <label>Parol</label>
            <div style="position:relative">
              <input type="password" id="password" required minlength="6" placeholder="Kamida 6 ta belgi" autocomplete="new-password" oninput="checkPasswordStrength()">
              <span onclick="togglePasswordVisibility('password', 'reg-eye')" 
                    id="reg-eye" 
                    style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:17px; user-select:none;">👁️</span>
            </div>
            <div id="password-strength" style="margin-top:6px; height:4px; background:#e2e8f0; border-radius:999px; overflow:hidden; display:none;">
              <div id="strength-bar" style="height:4px; width:0%; transition:width .3s; background:#ef4444;"></div>
            </div>
            <small id="strength-text" style="font-size:11px; color:#64748b; display:none; margin-top:2px;"></small>
          </div>

          <div class="form-group">
            <label>Parolni tasdiqlang</label>
            <input type="password" id="confirmPassword" required minlength="6" placeholder="Parolni qayta kiriting" autocomplete="new-password">
          </div>

          <div class="form-group">
            <label>Rol</label>
            <select id="role">
              <option value="admin">Administrator</option>
              <option value="accountant">Buxgalter / Accountant</option>
              <option value="tenant">Ijarachi</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; padding:13px; margin-top:8px; font-size:15px">
            Ro'yxatdan o'tish
          </button>
        </form>

        <div style="margin-top:22px; text-align:center; font-size:13.5px">
          Allaqachon hisobingiz bormi? <a href="login.html" style="color:#0ea5e9; font-weight:600">Kirish</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        alert("Parollar mos kelmadi!");
        return;
      }

      const userData = {
        fullName: document.getElementById('fullName').value,
        company: document.getElementById('company').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: password,
        role: document.getElementById('role').value
      };

      const result = window.UzAuth.registerUser(userData);
      if (result.success) {
        window.UzAuth.setCurrentUser(result.user);
        alert("Ro'yxatdan o'tish muvaffaqiyatli!");
        window.location.href = 'dashboard.html';
      } else {
        alert(result.error);
      }
    });
  </script>
</body>
</html>
