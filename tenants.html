<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ijarachilar — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="logo">
        <span id="logo-container"></span>
        <span>UzTenantBill</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="buildings.html">Binolar</a>
        <a href="tenants.html" class="active">Ijarachilar</a>
        <a href="billing.html">Billing</a>
        <a href="reports.html">Hisobotlar</a>
      </div>
      <div id="nav-user"></div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1 style="margin:0; font-size:29px; font-weight:800;">Ijarachilar</h1>
        <p style="margin:6px 0 0; color:#64748b;">Barcha ijarachilar va to'lov holati</p>
      </div>
      
      <div class="admin-only">
        <button onclick="window.UzApp.sendBulkReminders()" class="btn btn-secondary">Ommaviy eslatma</button>
        <button onclick="window.UzApp.bulkMarkPaid()" class="btn btn-secondary">Bulk To'landi</button>
        <button onclick="window.UzApp.showCollectionHeatmap()" class="btn btn-outline">Heatmap</button>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="padding:0;">
        <div class="table-filter" style="padding:12px 16px;border-bottom:1px solid #e2e8f0;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <input id="tenant-search" class="advanced-input" placeholder="Ijarachi qidirish..." style="max-width:210px" onkeyup="window.UzApp.filterTenantsTable()">
          <select id="tenant-status-filter" class="advanced-input" style="max-width:140px" onchange="window.UzApp.filterTenantsTable()">
            <option value="">Barcha statuslar</option>
            <option value="paid">Paid</option>
            <option value="partial">Partial</option>
            <option value="late">Late</option>
          </select>
          <button onclick="window.UzApp.filterTenantsTable()" class="btn btn-sm btn-outline">Filter</button>
          <button onclick="window.UzApp.bulkMarkPaid()" class="btn btn-sm btn-success admin-only">Bulk To'landi</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Ijarachi</th>
                <th>Unit / Bino</th>
                <th>Maydon</th>
                <th>Oylik hisob</th>
                <th>To'langan</th>
                <th>Status</th>
                <th>Balance</th>
                <th>Harakatlar</th>
              </tr>
            </thead>
            <tbody id="tenants-table"></tbody>
          </table>
        </div>
      </div>
    </div>
    
    <div class="admin-only" style="margin-top:12px; font-size:12.5px; color:#64748b;">
      Faqat admin va buxgalter to'liq ma'lumotlarni ko'radi.
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">Proof <span onclick="this.closest('.modal').classList.remove('active')" style="cursor:pointer;font-size:26px;line-height:1;">×</span></div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logo.js"></script>
  <script src="js/app.js"></script>
  <script>
    const user = window.UzAuth.protectPage();
    if (user) {
      window.UzAuth.updateNavbar();

      const logoContainer = document.getElementById('logo-container');
      if (logoContainer && window.UzLogo) logoContainer.innerHTML = window.UzLogo.getLogoSVG(28);

      document.body.classList.add('role-' + user.role);

      setTimeout(() => {
        if (window.UzApp && window.UzApp.renderTenantsTable) {
          window.UzApp.renderTenantsTable();
        }
      }, 80);

      if (user.role === 'tenant') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
      }
    }
  </script>
</body>
</html>
