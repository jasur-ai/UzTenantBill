<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); padding: 20px; }
    .auth-card { background: white; border-radius: 22px; box-shadow: 0 25px 50px -12px rgb(15 23 42 / 0.35); width: 100%; max-width: 420px; overflow: hidden; }
    .auth-header { padding: 38px 34px 24px; text-align: center; background: #f8fafc; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px;">
          <span id="logo-container"></span>
          <span style="font-size:27px;font-weight:800;letter-spacing:-1.1px;color:#0f172a">UzTenantBill</span>
        </div>
        <div style="font-size:14.5px;color:#64748b;">2026 Toshkent tijorat mulki platformasi</div>
      </div>

      <div style="padding:32px 34px 30px">
        <div style="margin-bottom:26px">
          <h2 style="margin:0 0 4px 0;font-size:24px;font-weight:800;">Kirish</h2>
          <p style="margin:0;color:#64748b;font-size:15px">Hisobingizga kiring</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" class="premium-input" required placeholder="siz@kompaniya.uz" value="admin@uztenantbill.uz">
          </div>

          <div class="form-group">
            <div style="display:flex; justify-content:space-between; align-items:center">
              <label>Parol</label>
              <a href="#" onclick="forgotPassword(); return false;" style="font-size:12.5px;color:#0ea5e9; font-weight:600;">Parolni unutdingizmi?</a>
            </div>
            <div style="position:relative">
              <input type="password" id="password" class="premium-input" required placeholder="Parolingiz" value="admin123">
              <span onclick="togglePasswordVisibility('password', 'login-eye')" id="login-eye" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:19px; user-select:none; opacity:0.65">👁️</span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; padding:15px; font-size:15.5px; margin-top:6px; font-weight:700;">Kirish</button>
        </form>

        <div style="margin-top:26px; padding:18px; background:#f8fafc; border-radius:14px; font-size:13.5px;">
          <div style="font-weight:700; margin-bottom:10px; color:#334155;">Demo hisoblar</div>
          <div style="line-height:1.65; font-size:13.5px; color:#475569;">
            <div><strong>Admin:</strong> admin@uztenantbill.uz / admin123</div>
            <div><strong>Accountant:</strong> accountant@uztenantbill.uz / account123</div>
            <div><strong>Tenant:</strong> tenant@uztenantbill.uz / tenant123</div>
          </div>
        </div>

        <div style="margin-top:22px; text-align:center; font-size:14.5px">
          Hisobingiz yo'qmi? <a href="register.html" style="color:#0ea5e9; font-weight:700;">Ro'yxatdan o'tish</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logo.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = window.UzAuth.loginUser(email, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        alert(result.error);
      }
    });

    // Inject logo
    setTimeout(() => {
      const logoContainer = document.getElementById('logo-container');
      if (logoContainer && window.UzLogo) {
        logoContainer.innerHTML = window.UzLogo.getLogoSVG(34);
      }
    }, 50);
  </script>
</body>
</html>
