<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing &amp; RUBS — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="logo">
        <span id="logo-container"></span>
        <span>UzTenantBill</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="buildings.html">Binolar</a>
        <a href="tenants.html">Ijarachilar</a>
        <a href="billing.html" class="active">Billing</a>
        <a href="reports.html">Hisobotlar</a>
      </div>
      <div id="nav-user"></div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1 style="margin:0; font-size:29px; font-weight:800;">Billing &amp; RUBS</h1>
        <p style="color:#64748b;">Real-time utility recovery va avtomatik hisob-kitob</p>
      </div>
    </div>

    <div class="card" style="margin-bottom:26px;">
      <div class="card-body">
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <button onclick="window.UzApp.sendBulkReminders()" class="btn btn-primary">Eslatma yuborish</button>
          <button onclick="window.UzApp.uploadOCR()" class="btn btn-secondary">AI OCR yuklash</button>
          <button onclick="window.UzApp.generateReport('pdf')" class="btn btn-outline">PDF hisobot</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><strong>RUBS Calculator</strong></div>
      <div class="card-body">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
          <div>
            <div class="rubs-form">
              <h4 style="margin-top:0;">Bino tanlang</h4>
              <select id="rubs-building-select" style="margin-bottom:16px;"></select>
              <button onclick="runRUBSFromBilling()" class="btn btn-primary">RUBS hisobla</button>
            </div>
          </div>
          <div>
            <div style="background:#f8fafc; padding:20px; border-radius:12px;">
              <div style="font-size:13px; color:#64748b;">2026 yilgi real ma'lumotlar</div>
              <div style="font-size:15px; margin-top:8px;"><strong>Sergeli Business Hub:</strong> 24.5M UZS (87 tenants)</div>
              <div style="font-size:15px;"><strong>Chilonzor Trade Center:</strong> 41.2M UZS (132 tenants)</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">RUBS / OCR <span onclick="this.closest('.modal').classList.remove('active')" style="cursor:pointer;font-size:27px;">×</span></div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logo.js"></script>
  <script src="js/app.js"></script>
  <script>
    const user = window.UzAuth.protectPage();
    if (user) {
      window.UzAuth.updateNavbar();

      const logoContainer = document.getElementById('logo-container');
      if (logoContainer && window.UzLogo) logoContainer.innerHTML = window.UzLogo.getLogoSVG(28);

      // Apply role class + tenant hiding
      document.body.classList.add('role-' + user.role);
      if (user.role === 'tenant') {
        document.querySelectorAll('.admin-only, button[onclick*="sendBulk"], button[onclick*="uploadOCR"]').forEach(el => el.style.display = 'none');
      }

      setTimeout(() => {
        const sel = document.getElementById('rubs-building-select');
        if (sel && window.UzApp && window.UzApp.buildingsData) {
          const buildings = window.UzApp.buildingsData;
          sel.innerHTML = buildings.map(b => `<option value="${b.id}">${b.name} — ${(b.monthly_utility_uzs/1000000).toFixed(1)}M</option>`).join('');
        }
        if (window.UzApp && window.UzApp.initApp) window.UzApp.initApp();
      }, 120);
    }

    function runRUBSFromBilling() {
      const sel = document.getElementById('rubs-building-select');
      if (!sel || !sel.value) return;
      const fn = (window.UzApp && window.UzApp.runRUBSForBuilding) || window.runRUBSForBuilding;
      if (typeof fn === 'function') fn(parseInt(sel.value));
    }
  </script>
</body>
</html>
