<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binolar — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="logo">
        <span id="logo-container"></span>
        <span>UzTenantBill</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="buildings.html" class="active">Binolar</a>
        <a href="tenants.html">Ijarachilar</a>
        <a href="billing.html">Billing</a>
        <a href="reports.html">Hisobotlar</a>
      </div>
      <div id="nav-user"></div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1 style="margin:0; font-size:29px; font-weight:800;">Binolar</h1>
        <p style="margin:6px 0 0; color:#64748b;">2026 Toshkent tijorat mulki — real ma'lumotlar</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="window.UzApp.addNewBuilding()" class="btn btn-primary">+ Yangi bino qo'shish</button>
        <button onclick="window.UzApp.uploadOCR()" class="btn btn-secondary">AI OCR yuklash</button>
        <button onclick="window.UzApp.calculatePenalties(1)" class="btn btn-secondary">5% Jarima hisoblash</button>
        <button onclick="window.UzApp.exportCAMTo1C()" class="btn btn-outline">1C + CAM Export</button>
        <button onclick="window.UzApp.showBuildingBenchmark(1)" class="btn btn-outline">Real Benchmark</button>
        <button onclick="window.UzApp.analyzeOccupancy()" class="btn btn-outline">Occupancy Uplift</button>
        <button onclick="window.UzApp.forecastCashflow()" class="btn btn-secondary">Cashflow Forecast</button>
        <button onclick="window.UzApp.compareToYardi(1)" class="btn btn-outline">vs Yardi</button>
        <button onclick="window.UzApp.calculateLocalROI()" class="btn btn-secondary">Local ROI</button>
        <button onclick="window.UzApp.showMarketEdge()" class="btn btn-outline">Market Edge</button>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="padding:0;">
        <div class="table-filter" style="padding:12px 16px;border-bottom:1px solid #e2e8f0;">
          <input id="bldg-search" class="advanced-input" placeholder="Bino qidirish..." style="max-width:240px" onkeyup="window.UzApp.filterBuildingsTable()">
          <select id="bldg-filter-loc" class="advanced-input" style="max-width:160px" onchange="window.UzApp.filterBuildingsTable()">
            <option value="">Barcha hududlar</option>
            <option>Sergeli</option><option>Yakkasaroy</option><option>Chilonzor</option><option>Mirabad</option><option>Mirzo Ulug'bek</option>
          </select>
          <button onclick="window.UzApp.filterBuildingsTable()" class="btn btn-sm btn-outline">Filtrla</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th onclick="window.UzApp.sortBuildings('name')">Bino nomi</th><th>Hudud</th><th>Maydon</th><th>Ijarachilar</th><th>Oylik</th><th>Yig'ish</th><th>Harakatlar</th>
              </tr>
            </thead>
            <tbody id="buildings-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">RUBS hisoblash <span onclick="this.closest('.modal').classList.remove('active')" style="cursor:pointer; font-size:26px;">×</span></div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logo.js"></script>
  <script src="js/app.js"></script>
  <script>
    const user = window.UzAuth.protectPage();
    if (user) {
      window.UzAuth.updateNavbar();

      const logoContainer = document.getElementById('logo-container');
      if (logoContainer && window.UzLogo) logoContainer.innerHTML = window.UzLogo.getLogoSVG(28);

      setTimeout(() => {
        if (window.UzApp && window.UzApp.renderBuildingsTable) window.UzApp.renderBuildingsTable();
      }, 80);

      // Strict tenant hiding
      setTimeout(() => {
        if (user.role === 'tenant') {
          document.querySelectorAll('.admin-only, button[onclick*="addNewBuilding"], button[onclick*="uploadOCR"]').forEach(el => el.style.display = 'none');
          document.body.classList.add('role-tenant');
        }
      }, 120);
    }
  </script>
</body>
</html>
