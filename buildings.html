<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binolar — UzTenantBill</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="logo">
        <span id="logo-container"></span>
        <span>UzTenantBill</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="buildings.html" class="active">Binolar</a>
        <a href="tenants.html">Ijarachilar</a>
        <a href="billing.html">Billing</a>
        <a href="reports.html">Hisobotlar</a>
      </div>
      <div id="nav-user"></div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1 style="margin:0; font-size:29px; font-weight:800;">Binolar</h1>
        <p style="margin:6px 0 0; color:#64748b;">2026 Toshkent tijorat mulki — real ma'lumotlar</p>
      </div>
      <div style="display:flex; gap:10px;">
        <button onclick="window.UzApp.addNewBuilding()" class="btn btn-primary">+ Yangi bino qo'shish</button>
        <button onclick="window.UzApp.uploadOCR()" class="btn btn-secondary">AI OCR yuklash</button>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="padding:0;">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Bino nomi</th><th>Hudud</th><th>Maydon</th><th>Ijarachilar</th><th>Oylik</th><th>Yig'ish</th><th>Harakatlar</th>
              </tr>
            </thead>
            <tbody id="buildings-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">RUBS hisoblash <span onclick="this.closest('.modal').classList.remove('active')" style="cursor:pointer; font-size:26px;">×</span></div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logo.js"></script>
  <script src="js/app.js"></script>
  <script>
    const user = window.UzAuth.protectPage();
    if (user) {
      window.UzAuth.updateNavbar();

      const logoContainer = document.getElementById('logo-container');
      if (logoContainer && window.UzLogo) logoContainer.innerHTML = window.UzLogo.getLogoSVG(28);

      setTimeout(() => {
        if (window.UzApp && window.UzApp.renderBuildingsTable) window.UzApp.renderBuildingsTable();
      }, 80);

      // Strict tenant hiding
      setTimeout(() => {
        if (user.role === 'tenant') {
          document.querySelectorAll('.admin-only, button[onclick*="addNewBuilding"], button[onclick*="uploadOCR"]').forEach(el => el.style.display = 'none');
          document.body.classList.add('role-tenant');
        }
      }, 120);
    }
  </script>
</body>
</html>
